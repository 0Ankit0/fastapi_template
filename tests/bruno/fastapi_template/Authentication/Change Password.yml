info:
  name: Change Password
  type: http
  seq: 7

http:
  method: POST
  url: "{{BASE_URI}}/api/v1/auth/change-password/"
  body:
    type: json
    data: |-
      {
        "current_password": "User@123",
        "new_password": "User@1234",
        "confirm_password": "User@1234"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{BASE_URI}}/api/v1/auth/change-password/"
      method: POST
      body:
        type: json
        data: |-
          {
          	"current_password": "User@123",
          	"new_password": "User@1234",
          	"confirm_password": "User@1234"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Mon, 29 Jun 2026 01:43:45 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "55"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Password changed successfully",
            "data": null
          }
