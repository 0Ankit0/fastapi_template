info:
  name: Login Access Token
  type: http
  seq: 8

http:
  method: POST
  url: "{{BASE_URI}}/api/v1/auth/login/?set_cookie=false"
  params:
    - name: set_cookie
      value: "false"
      type: query
  body:
    type: json
    data: |-
      {
        "organization": "global",
        "username": "user",
        "password": "User@123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setEnvVar("access_token", data.access);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
