info:
  name: Login Access Token
  type: http
  seq: 8

http:
  method: POST
  url: "{{BASE_URI}}/api/v1/auth/login/?set_cookie=false"
  params:
    - name: set_cookie
      value: "false"
      type: query
  body:
    type: json
    data: |-
      {
        "organization": "global",
        "username": "user",
        "password": "User@123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        // bru.setGlobalEnvVar('access_token', body.data.access)
        bru.setEnvVar('access_token', body.data.access);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{BASE_URI}}/api/v1/auth/login/?set_cookie=false"
      method: POST
      params:
        - name: set_cookie
          value: "false"
          type: query
      body:
        type: json
        data: |-
          {
            "organization": "global",
            "username": "user",
            "password": "User@123"
          }
