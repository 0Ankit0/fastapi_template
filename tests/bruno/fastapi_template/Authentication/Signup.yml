info:
  name: Signup
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URI}}/api/v1/auth/signup/?set_cookie=false"
  params:
    - name: set_cookie
      value: "false"
      type: query
  body:
    type: json
    data: |-
      {
        "username": "user",
        "email": "user@gmail.com",
        "is_active": true,
        "is_superuser": true,
        "first_name": "super",
        "last_name": "user",
        "phone": "",
        "password": "User@123",
        "confirm_password": "User@123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: already exists
    request:
      url: "{{BASE_URI}}/api/v1/auth/signup/?set_cookie=false"
      method: POST
      params:
        - name: set_cookie
          value: "false"
          type: query
      body:
        type: json
        data: |-
          {
          	"username": "admin",
          	"email": "admin@gmail.com",
          	"is_active": true,
          	"is_superuser": true,
          	"first_name": "super",
          	"last_name": "admin",
          	"phone": "",
          	"password": "Admin@123",
          	"confirm_password": "Admin@123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: date
          value: Mon, 29 Jun 2026 01:10:51 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "80"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": {
              "code": "common.validation_error",
              "message": "Username already exists"
            }
          }
