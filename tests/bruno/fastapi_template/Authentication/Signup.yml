info:
  name: Signup
  type: http
  seq: 1

http:
  method: POST
  url: /api/v1/auth/signup/?set_cookie=
  params:
    - name: set_cookie
      value: ""
      type: query
      description: undefined
  body:
    type: json
    data: |-
      {
      	"username": "",
      	"email": "",
      	"is_active": true,
      	"is_superuser": "",
      	"first_name": "",
      	"last_name": "",
      	"phone": "",
      	"password": "",
      	"confirm_password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
