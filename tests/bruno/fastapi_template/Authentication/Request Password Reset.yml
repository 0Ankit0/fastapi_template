info:
  name: Request Password Reset
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URI}}/api/v1/auth/password-reset-request/"
  body:
    type: json
    data: |-
      {
        "email": "user@gmail.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{BASE_URI}}/api/v1/auth/password-reset-request/"
      method: POST
      body:
        type: json
        data: |-
          {
          	"email": "user@gmail.com"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Mon, 29 Jun 2026 01:13:49 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "82"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "If the email exists, a password reset link has been sent",
            "data": null
          }
