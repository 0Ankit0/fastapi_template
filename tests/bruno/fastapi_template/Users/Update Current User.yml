info:
  name: Update Current User
  type: http
  seq: 3

http:
  method: PATCH
  url: /api/v1/users/me
  body:
    type: json
    data: |-
      {
      	"email": "",
      	"password": "",
      	"first_name": "",
      	"last_name": "",
      	"phone": "",
      	"is_active": "",
      	"is_superuser": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
