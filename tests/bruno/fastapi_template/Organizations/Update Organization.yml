info:
  name: Update Organization
  type: http
  seq: 4

http:
  method: PUT
  url: "{{BASE_URI}}/api/v1/organizations/:org_id"
  params:
    - name: org_id
      value: RQXPBOb6
      type: path
  body:
    type: json
    data: |-
      {
        "name": "test organization updated",
        "description": "updated test organization details",
        "status": "active"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const allowedStatuses = ["active", "suspended", "archived"];

        const body = typeof req.getBody() === "string" ? JSON.parse(req.getBody()) : req.getBody();

        if (!allowedStatuses.includes(body.status)) {
          throw new Error(
            `Invalid status '${body.status}'. Allowed values: ${allowedStatuses.join(", ")}`
          );
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{BASE_URI}}/api/v1/organizations/:org_id"
      method: PUT
      params:
        - name: org_id
          value: RQXPBOb6
          type: path
      body:
        type: json
        data: |-
          {
          	"name": "test organization updated",
          	"description": "updated test organization details",
          	"status": "active"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 18 Jun 2026 00:55:26 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "189"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Organization updated successfully",
            "data": {
              "name": "test organization updated",
              "description": "updated test organization details",
              "id": "RQXPBOb6",
              "slug": "test",
              "status": "active"
            }
          }
