info:
  name: Create Organization
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URI}}/api/v1/organizations/:org"
  params:
    - name: org
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "testOrg",
        "description": "This is a test Organization",
        "slug": "testOrg",
        "status": "active"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const allowedStatuses = ["active", "suspended", "archived"];

        const body = typeof req.getBody() === "string" ? JSON.parse(req.getBody()) : req.getBody();

        if (!allowedStatuses.includes(body.status)) {
          throw new Error(
            `Invalid status '${body.status}'. Allowed values: ${allowedStatuses.join(", ")}`
          );
        }
    - type: after-response
      code: |-
        const body = res.getBody();

        // bru.setGlobalEnvVar('access_token', body.data.access)
        bru.setEnvVar('TEST_ORG_ID', body.data.id);
        bru.setEnvVar('TEST_ORG', body.data.slug)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{BASE_URI}}/api/v1/organizations/"
      method: POST
      body:
        type: json
        data: |-
          {
          	"name": "testOrg",
          	"description": "This is a test Organization",
          	"slug": "testOrg",
          	"status": "active"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 18 Jun 2026 00:49:52 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "168"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Organization created successfully",
            "data": {
              "name": "testOrg",
              "description": "This is a test Organization",
              "id": "GK3daXl8",
              "slug": "testorg",
              "status": "active"
            }
          }
