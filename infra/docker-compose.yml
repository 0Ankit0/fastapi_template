# 1. Top-Level Anchors for Global Configuration
x-api-env: &api-env
  DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}"
  # Celery Infrastructure Mappings
  CELERY_BROKER_URL: "${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}"
  CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-rpc://}"
  CELERY_TASK_ALWAYS_EAGER: "${CELERY_TASK_ALWAYS_EAGER:-false}"
  # OpenTelemetry Endpoint Configuration
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

x-db-env: &db-env
  POSTGRES_USER: "${POSTGRES_USER:-app}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-app}"
  POSTGRES_DB: "${POSTGRES_DB:-app}"

x-jaeger-env: &jaeger-env
  COLLECTOR_OTLP_ENABLED: "true"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: fastapi_api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *api-env
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-fastapi-api}" # Unique name for Web API
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started

  celery_worker:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: celery_worker
    command: ["uv", "run", "celery", "-A", "src.core.celery_app", "worker", "--loglevel=info"]
    environment:
      <<: *api-env
      OTEL_SERVICE_NAME: "celery-worker" # Unique name for Tracing your Background Tasks
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment: *db-env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
    environment: *jaeger-env
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 16686 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel_collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/otel-collector.yaml:/etc/otel-collector.yaml
    depends_on:
      jaeger:
        condition: service_healthy

volumes:
  pgdata: