# 1. Top-Level Anchors for Global Configuration
x-api-env: &api-env
  DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}"
  OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-fastapi-api}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

x-db-env: &db-env
  POSTGRES_USER: "${POSTGRES_USER:-app}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-app}"
  POSTGRES_DB: "${POSTGRES_DB:-app}"

x-jaeger-env: &jaeger-env
  COLLECTOR_OTLP_ENABLED: "true"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: fastapi_api
    ports:
      - "${API_PORT:-8000}:8000"
    # Using the anchor block for the API's core tracing and routing variables
    environment: *api-env
    # Points to the .env in the root context folder where you run Docker Compose
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment: *db-env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
    environment: *jaeger-env
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 16686 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel_collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml
    depends_on:
      jaeger:
        condition: service_healthy

volumes:
  pgdata: