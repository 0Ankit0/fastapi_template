services:
  backend:
    command:
      - /bin/sh
      - -c
      - mkdir -p /tmp/uv-cache && UV_CACHE_DIR=/tmp/uv-cache uv sync --frozen --no-dev && alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock

  worker:
    command:
      - /bin/sh
      - -c
      - mkdir -p /tmp/uv-cache && UV_CACHE_DIR=/tmp/uv-cache uv sync --frozen --no-dev && celery -A src.apps.core.celery_app worker --loglevel=info
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock

  frontend:
    build:
      context: ./frontend
      target: deps
    command:
      - /bin/sh
      - -c
      - if [ ! -d /app/node_modules/@vitejs/plugin-react ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
