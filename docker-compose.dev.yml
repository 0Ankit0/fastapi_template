services:
  backend:
    command:
      - /bin/sh
      - -c
      - alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini

  worker:
    command:
      - celery
      - -A
      - src.apps.core.celery_app
      - worker
      - --loglevel=info
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini

  frontend:
    build:
      context: ./frontend
      target: deps
    command:
      - /bin/sh
      - -c
      - if [ ! -d /app/node_modules/@vitejs/plugin-react ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
